project:
  name: okx-contract-signal-system
  timezone: UTC
  exchange: OKX
  mode: SIGNAL_ONLY

data:
  read_only: true
  root_dir: D:/JIAOYI-CX/历史数据_保留
  historical_dataset: okx_15m_extended
  timeframe: 15m
  trend_timeframe: 1h
  symbols:
    - BTC-USDT-SWAP
    - ETH-USDT-SWAP
    - SOL-USDT-SWAP
    - HYPE-USDT-SWAP
    - DOGE-USDT-SWAP
    - XRP-USDT-SWAP
    - ADA-USDT-SWAP
    - LINK-USDT-SWAP
    - AVAX-USDT-SWAP
    - LTC-USDT-SWAP
    - DOT-USDT-SWAP
    - BCH-USDT-SWAP
    - TRX-USDT-SWAP
    - UNI-USDT-SWAP
    - ETC-USDT-SWAP
    - ATOM-USDT-SWAP
    - APT-USDT-SWAP
    - ARB-USDT-SWAP
    - FIL-USDT-SWAP
    - NEAR-USDT-SWAP
    - OP-USDT-SWAP

execution:
  live_order_enabled: false
  auto_close_enabled: false
  dry_run_enabled: true
  exchange_adapter: okx

strategy:
  fast_ema: 120
  slow_ema: 720
  breakout_window: 384
  atr_stop_mult: 4.0
  take_profit_mult: 6.0
  max_hold_bars: 768
  atr_window: 14
  min_vote_approval_rate: 0.40

learning:
  live_param_updates_enabled: false
  daily_review_enabled: true
  review_interval_hours: 24
  history_days: 1095
  min_validation_trades: 30
  min_validation_profit_factor: 1.05
  min_profit_factor_delta: 0.05
  min_profit_factor_ratio: 1.05
  max_validation_drawdown: 0.20
  max_drawdown_worsening: 0.02
  max_param_distance: 0.35
  max_train_valid_pf_ratio: 3.0
  min_profitable_symbol_ratio: 0.35
  max_candidate_params: 17
  max_runtime_seconds: 300
  auto_promote_params: false
  shadow_score_min_closed_signals: 6
  shadow_min_closed_signals: 30
  shadow_min_quality_score: 70

feishu:
  enabled: true

project:
  name: okx-contract-signal-system
  timezone: UTC
  exchange: OKX
  mode: research

data:
  historical_dataset: okx_15m_extended
  timeframe: 15m
  trend_timeframe: 1h
  symbols:
    - BTC-USDT-SWAP
    - ETH-USDT-SWAP
    - SOL-USDT-SWAP
    - HYPE-USDT-SWAP
    - DOGE-USDT-SWAP
    - XRP-USDT-SWAP
    - ADA-USDT-SWAP
    - LINK-USDT-SWAP
    - AVAX-USDT-SWAP
    - LTC-USDT-SWAP
    - DOT-USDT-SWAP
    - BCH-USDT-SWAP
    - TRX-USDT-SWAP
    - UNI-USDT-SWAP
    - ETC-USDT-SWAP
    - ATOM-USDT-SWAP
    - APT-USDT-SWAP
    - ARB-USDT-SWAP
    - FIL-USDT-SWAP
    - NEAR-USDT-SWAP
    - OP-USDT-SWAP

execution:
  live_order_enabled: false
  dry_run_enabled: true
  exchange_adapter: okx

strategy:
  fast_ema: 120
  slow_ema: 720
  breakout_window: 384
  atr_stop_mult: 4.0
  take_profit_mult: 6.0
  max_hold_bars: 768
  atr_window: 14

learning:
  live_param_updates_enabled: false
  shadow_score_min_closed_signals: 6
  shadow_min_closed_signals: 30
  shadow_min_quality_score: 70

feishu:
  enabled: true

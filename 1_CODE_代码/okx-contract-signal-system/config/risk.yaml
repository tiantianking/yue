risk:
  margin_mode: isolated
  position_mode: one_way  # OKX 单向持仓模式
  max_leverage: 10
  per_symbol_initial_equity: 10000
  halt_equity_ratio: 0.73
  max_single_symbol_position: 1
  require_stop_loss: true
  require_take_profit: true
  require_max_hold: true

strategy:
  fast_ema: [10, 20, 30]
  slow_ema: [50, 60, 80]
  breakout_window: [20, 40, 60]
  atr_stop_mult: [1.5, 2.0, 2.5, 3.0]
  take_profit_mult: [1.5, 2.0, 3.0, 4.0]
  max_hold_bars: [24, 48, 72]
